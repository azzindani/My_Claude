name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck --severity=warning install.sh
          shellcheck --severity=warning home/.claude/hooks/ask-user-question-reminder.sh
          shellcheck --severity=warning home/.claude/statusline-command.sh

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          # Write-Host is the right tool for an installer's user-facing output
          # (the alternative, Write-Information, is invisible without
          # -InformationAction Continue). Exclude that rule.
          $excluded = @('PSAvoidUsingWriteHost')
          $issues  = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error,Warning -ExcludeRule $excluded
          $issues += Invoke-ScriptAnalyzer -Path home/.claude/hooks/ask-user-question-reminder.ps1 -Severity Error,Warning -ExcludeRule $excluded
          if ($issues) {
              $issues | Format-Table -AutoSize -Wrap
              exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"

      - name: Validate source settings.json template
        run: python3 tools/validate_template.py home/.claude/settings.json

  install-test:
    name: Install on ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # ----- Unix (Linux + macOS) ---------------------------------------
      - name: install.sh --dry-run
        if: runner.os != 'Windows'
        run: |
          chmod +x ./install.sh
          ./install.sh --claude-home "${RUNNER_TEMP}/test-claude" --dry-run

      - name: install.sh
        if: runner.os != 'Windows'
        run: ./install.sh --claude-home "${RUNNER_TEMP}/test-claude"

      - name: Validate (Unix)
        if: runner.os != 'Windows'
        run: python3 tools/validate_install.py "${RUNNER_TEMP}/test-claude" bash

      - name: Hook smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          OUT="$(echo '{}' | bash "${RUNNER_TEMP}/test-claude/hooks/ask-user-question-reminder.sh")"
          echo "$OUT"
          echo "$OUT" | python3 -c "import json, sys; json.loads(sys.stdin.read())"

      - name: Statusline smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          OUT="$(echo '{"model":{"display_name":"opus-4-7"},"workspace":{"current_dir":"/tmp"},"context_window":{"used_percentage":42}}' | python3 "${RUNNER_TEMP}/test-claude/statusline.py")"
          echo "$OUT"
          test -n "$OUT"

      - name: Re-install with --force (idempotency)
        if: runner.os != 'Windows'
        run: |
          ./install.sh --claude-home "${RUNNER_TEMP}/test-claude" --force
          python3 tools/validate_install.py "${RUNNER_TEMP}/test-claude" bash

      # ----- Windows -----------------------------------------------------
      - name: install.ps1 -DryRun
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./install.ps1 -ClaudeHome "$env:RUNNER_TEMP\test-claude" -DryRun

      - name: install.ps1
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./install.ps1 -ClaudeHome "$env:RUNNER_TEMP\test-claude"

      - name: Validate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tools/validate_install.py "$env:RUNNER_TEMP\test-claude" powershell

      - name: Hook smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "" | powershell -NoProfile -ExecutionPolicy Bypass -File "$env:RUNNER_TEMP\test-claude\hooks\ask-user-question-reminder.ps1"
          Write-Host $out
          $out | python -c "import json, sys; json.loads(sys.stdin.read())"

      - name: Statusline smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sample = '{"model":{"display_name":"opus-4-7"},"workspace":{"current_dir":"C:/tmp"},"context_window":{"used_percentage":42}}'
          $out = $sample | python "$env:RUNNER_TEMP\test-claude\statusline.py"
          Write-Host $out
          if (-not $out) { throw "empty statusline output" }

      - name: Re-install with -Force (idempotency)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./install.ps1 -ClaudeHome "$env:RUNNER_TEMP\test-claude" -Force
          python tools/validate_install.py "$env:RUNNER_TEMP\test-claude" powershell
